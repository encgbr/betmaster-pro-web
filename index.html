<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>BetMaster Pro 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
        { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <style>body { background-color: #0f172a; color: white; }</style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold mb-6 text-emerald-500">BetMaster Pro 2.0</h1>
        
        <div class="bg-gray-900 p-6 rounded-xl border border-gray-700 mb-8">
            <label class="block text-lg mb-4">Carregar Print de Jogo:</label>
            <input type="file" id="imageInput" accept="image/*" class="w-full p-3 bg-gray-800 rounded">
            <button id="analyzeBtn" class="mt-4 w-full bg-emerald-600 p-3 rounded font-bold hover:bg-emerald-500">ANALISAR AGORA</button>
        </div>

        <div id="result" class="bg-gray-800 p-6 rounded-xl border border-emerald-500/30 hidden">
            <h2 class="text-2xl font-bold mb-4">Análise Estatística:</h2>
            <div id="output" class="text-gray-300 whitespace-pre-line"></div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";
        
        // A Vercel injeta a variável de ambiente automaticamente
        const API_KEY = process.env.GEMINI_API_KEY; 
        const genAI = new GoogleGenerativeAI(API_KEY);

        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const file = document.getElementById('imageInput').files[0];
            if (!file) return alert("Escolhe uma imagem!");

            document.getElementById('result').classList.remove('hidden');
            document.getElementById('output').innerText = "A analisar em tempo real com Google Search...";

            // Lógica de leitura de imagem e envio para o Gemini
            const reader = new FileReader();
            reader.onloadend = async () => {
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const prompt = "Tu és o BetMaster 2.0. Analisa esta imagem de jogo, cruza com dados reais do Google Search e dá uma tip com EV+.";
                
                const result = await model.generateContent([prompt, { inlineData: { data: reader.result.split(',')[1], mimeType: file.type } }]);
                document.getElementById('output').innerText = result.response.text();
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
