<!DOCTYPE html>
<html>
<body>
    <h1>BetMaster Pro</h1>
    <input type="text" id="game" placeholder="Nome do jogo">
    <button onclick="analyze()">Analisar</button>
    <div id="res"></div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        
        window.analyze = async () => {
            const resDiv = document.getElementById('res');
            resDiv.innerText = "A analisar...";
            
            try {
                // A tua chave real aqui
                const genAI = new GoogleGenerativeAI("AIzaSyBu65Z32wui_GyhJQVqm5T8gVlwMUzdD-8"); 
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const prompt = "Analisa o jogo: " + document.getElementById('game').value + ". Dá uma tip com valor.";
                
                const result = await model.generateContent(prompt);
                resDiv.innerText = result.response.text();
            } catch (e) {
                resDiv.innerText = "Erro: " + e.message;
            }
        }
    </script>
</body>
</html>
